<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AGRI Fournisseur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fas fa-seedling"></i></div>
                <h1>AGRI Fournisseur</h1>
                <p>Portail de gestion des fournisseurs</p>
            </div>

            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Adresse email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="votre@email.ma"
                        required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                        required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="loginBtn">
                    <span>Se connecter</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>Pas encore de compte ? <a href="register.html">Créer un compte</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '';

        document.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('fournisseur');
            if (user) window.location.href = 'dashboard.html';
        });

        function showAlert(message, type = 'error') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            if (type === 'error') setTimeout(() => container.innerHTML = '', 5000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<span>Connexion...</span>';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('fournisseur', JSON.stringify(data.user));
                    localStorage.setItem('fournisseurId', data.user.id);
                    showAlert('Connexion réussie !', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showAlert(data.error || 'Erreur de connexion');
                }
            } catch (err) {
                showAlert('Erreur de connexion au serveur');
            } finally {
                btn.innerHTML = '<span>Se connecter</span><i class="fas fa-arrow-right"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
