<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AGRI Fournisseur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon"><i class="fas fa-seedling"></i></div>
                    <div>
                        <div class="sidebar-logo-text">AGRI</div>
                        <div class="sidebar-logo-subtitle">Fournisseur</div>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Tableau de bord</div>
                    <a class="nav-item active" data-page="dashboard"><i class="fas fa-chart-pie"></i><span>Vue
                            d'ensemble</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Gestion</div>
                    <a class="nav-item" data-page="produits"><i
                            class="fas fa-boxes-stacked"></i><span>Catalogue</span></a>
                    <a class="nav-item" data-page="livraisons"><i class="fas fa-truck"></i><span>Livraisons</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Paramètres</div>
                    <a class="nav-item" data-page="profil"><i class="fas fa-user-gear"></i><span>Mon Profil</span></a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">F</div>
                    <div>
                        <div class="user-name" id="userName">Fournisseur</div>
                        <div class="user-role" id="userRole">Type</div>
                    </div>
                </div>
                <button class="btn-icon" id="logoutBtn" title="Déconnexion"
                    style="margin-left: auto; background: rgba(255,255,255,0.1); border: none; padding: 10px; border-radius: 8px; color: rgba(255,255,255,0.6); cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">
                    <h1 id="pageTitle">Tableau de Bord</h1>
                    <p id="pageSubtitle">Vue d'ensemble de l'activité</p>
                </div>
                <div class="topbar-actions">
                    <button class="btn btn-secondary" onclick="refreshPage()"><i class="fas fa-sync-alt"></i>
                        Actualiser</button>
                </div>
            </header>
            <div class="content-area" id="pageContent"></div>
        </main>
    </div>

    <!-- Modal Produit -->
    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="productModalTitle">Ajouter un produit</h3>
                <button class="modal-close" onclick="closeProductModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" id="productId">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Code produit</label>
                            <input type="text" id="productCode" class="form-control" placeholder="Auto-généré">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Catégorie *</label>
                            <select id="productCategory" class="form-control form-select" required>
                                <option value="">Sélectionner...</option>
                                <option value="CEREALES">Céréales</option>
                                <option value="LEGUMES">Légumes</option>
                                <option value="FRUITS">Fruits</option>
                                <option value="ENGRAIS">Engrais</option>
                                <option value="SEMENCES">Semences</option>
                                <option value="EQUIPEMENTS">Équipements</option>
                                <option value="AUTRE">Autre</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nom du produit *</label>
                        <input type="text" id="productName" class="form-control" placeholder="Ex: Blé dur premium"
                            required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="productDescription" class="form-control" rows="3"
                            placeholder="Description du produit..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Unité</label>
                            <select id="productUnit" class="form-control form-select">
                                <option value="KG">Kilogramme (KG)</option>
                                <option value="TONNE">Tonne</option>
                                <option value="LITRE">Litre</option>
                                <option value="UNITE">Unité</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Prix unitaire (MAD) *</label>
                            <input type="number" id="productPrice" class="form-control" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Stock disponible</label>
                            <input type="number" id="productStock" class="form-control" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Stock minimum (alerte)</label>
                            <input type="number" id="productStockMin" class="form-control" min="0" value="10">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeProductModal()">Annuler</button>
                <button class="btn btn-primary" onclick="saveProduct()"><i class="fas fa-save"></i> Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Modal Livraison Details -->
    <div class="modal-overlay" id="deliveryModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Détails de la livraison</h3>
                <button class="modal-close" onclick="closeDeliveryModal()">&times;</button>
            </div>
            <div class="modal-body" id="deliveryDetails"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeDeliveryModal()">Fermer</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
